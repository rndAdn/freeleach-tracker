services:
  sharewood:
    build: .
    command: node sharewood.js
    environment:
      - API_KEY=${API_KEY}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - DOWNLOAD_DIR=/downloads
      - INTERVAL=60
      - HISTORY_TTL_HOURS=24
      - MAX_SIZE_GB=250
      - TRACKER_NAME=Sharewood
      - DISCORD_COLOR=5763719
    volumes:
      - ./downloads/sharewood:/downloads
    restart: unless-stopped

  torr9:
    build: .
    command: node torr9.js
    environment:
      - TORR9_PASSKEY=${TORR9_PASSKEY}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - DOWNLOAD_DIR=/downloads
      - INTERVAL=60
      - HISTORY_TTL_HOURS=24
      - MAX_SIZE_GB=250
      - TRACKER_NAME=Torr9
      - DISCORD_COLOR=15844367
    volumes:
      - ./downloads/torr9:/downloads
    restart: unless-stopped

  c411:
    build: .
    command: node c411.js
    environment:
      - C411_PASSKEY=${C411_PASSKEY}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - DOWNLOAD_DIR=/downloads
      - INTERVAL=60
      - HISTORY_TTL_HOURS=24
      - MAX_SIZE_GB=250
      - TRACKER_NAME=C411
      - DISCORD_COLOR=3447003
    volumes:
      - ./downloads/c411:/downloads
    restart: unless-stopped

  g3mini:
    build: .
    command: node g3mini.js
    environment:
      - G3MINI_API_KEY=${G3MINI_API_KEY}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - DOWNLOAD_DIR=/downloads
      - INTERVAL=60
      - HISTORY_TTL_HOURS=24
      - MAX_SIZE_GB=250
      - TRACKER_NAME=G3MINI
      - DISCORD_COLOR=7419530
    volumes:
      - ./downloads/g3mini:/downloads
    restart: unless-stopped
