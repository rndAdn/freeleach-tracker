services:
  sharewood:
    build: .
    environment:
      - API_KEY=${API_KEY}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - DOWNLOAD_DIR=/downloads
      - INTERVAL=60
      - HISTORY_TTL_HOURS=24
      - MAX_SIZE_GB=250
    volumes:
      - ./downloads:/downloads
    restart: unless-stopped
