services:
  prowlarr-watcher:
    build: .
    command: node prowlarr-watcher.js
    environment:
      - PROWLARR_URL=http://your-server:30050
      - PROWLARR_API_KEY=your_prowlarr_api_key
      - DISCORD_WEBHOOK=https://discord.com/api/webhooks/your_webhook_id/your_webhook_token
      - TZ=Europe/Paris
      - INTERVAL=10
      - MAX_AGE_MINUTES=5
      - HISTORY_TTL_HOURS=24
      - UI_PORT=3000
      - TRACKERS=[{"id":1,"name":"Tracker1","color":16711680},{"id":2,"name":"Tracker2","color":15844367}]
      # Catégories à exclure globalement (IDs séparés par virgule)
      # Multiple de 1000 → exclut toute la famille (ex: 6000 = toute la famille XXX 6000-6999)
      # Autre → exact match (ex: 103510 = catégorie custom XXX)
      - EXCLUDED_CATEGORIES=6000,103510
    ports:
      - "3005:3000"
    restart: unless-stopped
